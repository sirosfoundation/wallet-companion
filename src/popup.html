<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Credentials Wallet Selector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="popup-layout">
  <div class="page-header -compact">
    <div class="left">
      <img src="icons/logo-dark.svg" alt="Siros" class="logo">
      <div class="text">
        <h1>Wallet Selector DC API</h1>
        <p class="subtitle">W3C Digital Credentials API</p>
      </div>
    </div>
    
  </div>
  
  <div class="popup-content">
    <div class="status-bar" id="statusBar">
      <span class="indicator" id="statusIndicator"></span>
      <span class="text" id="statusText">Active &amp; monitoring</span>
      <label class="toggle-switch -compact _ml-auto" title="Toggle extension on/off">
        <input type="checkbox" id="extensionToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="popup-stats">
      <p class="label">Statistics</p>
      <div class="stat-card -simple">
        <div class="value" id="interceptCount">0</div>
        <div class="label">Requests intercepted</div>
        <button id="clearBtn" class="s-button -outline -small">Clear</button>
      </div>
    </div>

    <div class="popup-wallets">
      <div class="header">
        <h3 class="title">
          My Wallets
          <span class="badge" id="walletCount">0</span>
        </h3>
        <button id="configureBtn" class="s-button -primary -small">Add or Configure</button>
      </div>
      <div class="list" id="walletList">
        <!-- Wallets will be inserted here -->
      </div>
    </div>
  </div>

  <div class="popup-footer">
    Digital Credentials Wallets Selector v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
