<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Companion</title>
  <link rel="stylesheet" href="../shared/style/global.css">
  <link rel="stylesheet" href="./style/style.css">
</head>
<body class="popup-layout">
  <div class="page-header -compact">
    <div class="left">
      <img src="../shared/assets/icons/logo-dark.svg" alt="Siros" class="logo">
      <div class="text">
        <h1 data-i18n-key="title"></h1>
        <p class="subtitle" data-i18n-key="subtitle"></p>
      </div>
    </div>

  </div>

  <div class="popup-content">
    <div class="status-bar" id="statusBar">
      <span class="indicator" id="statusIndicator"></span>
      <span class="text" id="statusText" data-i18n-key="status_active"></span>
      <label class="toggle-switch -compact _ml-auto" data-i18n-title="toggle_title">
        <input type="checkbox" id="extensionToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="popup-stats">
      <p class="label" data-i18n-key="stats_title"></p>
      <div class="stat-card -simple">
        <div class="value" id="interceptCount">0</div>
        <div class="label" data-i18n-key="stats_intercepted"></div>
        <button id="clearBtn" class="s-button -outline -small" data-i18n-key="clear"></button>
      </div>
    </div>

    <div class="popup-wallets">
      <div class="header">
        <h3 class="title">
          <span data-i18n-key="wallets_title"></span>
          <span class="badge" id="walletCount">0</span>
        </h3>
        <button id="configureBtn" class="s-button -primary -small" data-i18n-key="configure"></button>
      </div>
      <div class="list" id="walletList">
        <!-- Wallets will be inserted here -->
      </div>
    </div>
  </div>

  <div class="popup-footer" data-i18n-key="footer" data-i18n-sub="%VITE_APP_VERSION%">
  </div>

  <script src="./popup.ts" type="module"></script>
</body>
</html>
